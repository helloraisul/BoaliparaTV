name: boalipara_tv
description: BP TV - Live Sports Streaming App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  video_player: ^2.9.1
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  flutter_native_splash: ^2.4.1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  web: ^1.0.0
  dio: ^5.7.0
  open_filex: ^4.6.0
  path_provider: ^2.1.4
  wakelock_plus: ^1.1.4
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  assets:
    - assets/logos/
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logos/appLogo.png"
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#0A0E21"
  branding: assets/logos/appLogo.png
  branding_mode: bottom
  android_12:
    image: assets/logos/appLogo.png
    color: "#0A0E21"
